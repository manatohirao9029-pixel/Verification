services:
  db:
    image: mysql:8.2.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: personal_db
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    volumes:
        -  mysql-data:/var/lib/mysql
        -  ./script:/docker-entrypoint-initdb.d 
volumes:
  mysql-data: