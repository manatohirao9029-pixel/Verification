apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app: alertmanager
data:
  config.yml: |
    global:
      slack_api_url: 'https://hooks.slack.com/services/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'

    route:
      receiver: 'slack-notifications'

    receivers:
    - name: 'slack-notifications'
      slack_configs:
      - channel: '#all-alertpromsupport'
        send_resolved: true

        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'

        text: >-
          {{ range .Alerts }}
            *🚨 アラート:* {{ .Annotations.summary }}
            *📝 詳細:* {{ .Annotations.description }}
            *🏷️ ラベル情報:*
            {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
            {{ end }}
            ---
          {{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.27.0
        args:
          - '--config.file=/etc/alertmanager/config.yml'
          - '--storage.path=/alertmanager'
        ports:
        - name: alertmanager
          containerPort: 9093
        volumeMounts:
        - name: config-volume
          mountPath: /etc/alertmanager
        - name: alertmanager-data-volume
          mountPath: /alertmanager
      volumes:
      - name: config-volume
        configMap:
          name: alertmanager-config  # ← ここを「alertmanager-config」に完全に修正しました
      - name: alertmanager-data-volume # ← 混乱を防ぐため名前を一新
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring  # ← 前回のDeploymentに合わせてmonitoringにしています
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/path: '/alertmanager/metrics'
  labels:
    name: alertmanager
spec:
  type: ClusterIP  # ← ClusterIP に変更
  ports:
  - name: alertmanager
    protocol: TCP
    port: 9093
    targetPort: 9093  # ContainerPort（9093）へ転送します
  selector:
    app: alertmanager  # Deploymentの「app: alertmanager」ラベルを持つPodと紐付けます
