apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

      external_labels:
        cluster: monitoring-cluster
        replica: prometheus-0

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                # 【修正1】 KubernetesのService名と内部ポートを指定
                - 'alertmanager:9093'

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    scrape_configs:
      - job_name: 'my-node-exporter'
        static_configs:
          # 【修正2】 Docker特有の記述をやめ、KubernetesのService名を指定
          - targets: ['prometheus-node-exporter:9100']
